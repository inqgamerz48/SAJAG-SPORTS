<svg width="200" height="400" viewBox="0 0 200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Racquet Frame -->
  <ellipse cx="100" cy="200" rx="80" ry="150" stroke="#32ff00" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Handle -->
  <rect x="90" y="300" width="20" height="100" stroke="#32ff00" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Strings (vertical) -->
  <line x1="50" y1="100" x2="50" y2="300" stroke="#32ff00" stroke-width="1" opacity="0.2"/>
  <line x1="70" y1="100" x2="70" y2="300" stroke="#32ff00" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="100" x2="100" y2="300" stroke="#32ff00" stroke-width="1" opacity="0.2"/>
  <line x1="130" y1="100" x2="130" y2="300" stroke="#32ff00" stroke-width="1" opacity="0.2"/>
  <line x1="150" y1="100" x2="150" y2="300" stroke="#32ff00" stroke-width="1" opacity="0.2"/>
  <!-- Strings (horizontal) -->
  <line x1="50" y1="150" x2="150" y2="150" stroke="#32ff00" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="200" x2="150" y2="200" stroke="#32ff00" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="250" x2="150" y2="250" stroke="#32ff00" stroke-width="1" opacity="0.2"/>
</svg>
